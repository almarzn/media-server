apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  yggtorrent.server: |-
    # Include specific server zone
    yggtorrent.top. {
      errors
      forward . 9.9.9.9
    }
  quad9.override: |-
    # Use Quad9 as the default upstream DNS
    forward . 9.9.9.9 149.112.112.112